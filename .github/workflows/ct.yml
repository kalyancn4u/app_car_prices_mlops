# CT — Continuous Training.
# Retrains the model automatically: on a schedule, when the data changes, or on a
# manual click. train.py enforces the KPI gate, so a worse model can't be shipped.
# If the new model passes, the refreshed artifacts are committed back.
name: CT (retrain)

on:
  schedule:
    - cron: "0 3 * * 1"      # every Monday 03:00 UTC
  push:
    paths:
      - "data/**"            # whenever the dataset changes
  workflow_dispatch:          # a manual "Run workflow" button

permissions:
  contents: write             # allow committing the refreshed model back

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Validate data, then retrain (KPI gate blocks a bad model)
        run: |
          python -m car_pricing.validation
          python -m car_pricing.train

      - name: Commit refreshed model if it passed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/
          git commit -m "CT: retrain model [skip ci]" || echo "nothing changed"
          git push
